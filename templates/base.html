<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="https://use.typekit.net/qdt5rud.css">
  <link rel="icon" href="{{ get_url(path="favicon.ico") }}">
  <link rel="stylesheet" href="{{ get_url(path="giallo-light.css") }}" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="{{ get_url(path="giallo-dark.css") }}" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path="atom.xml", trailing_slash=false) }}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{{ current_url | default(value=config.base_url) }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
</head>
<body>
  <header>
    <nav>
      <a href="{{ get_url(path="/") }}">Home</a>
      <a href="{{ get_url(path="/tags/") }}">Tags</a>
      <a href="{{ get_url(path="@/about/_index.md") }}">About</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>&copy; {{ now() | date(format="%Y") }} {{ config.author }}. <a href="{{ get_url(path="atom.xml", trailing_slash=false) }}">Atom feed</a></p>
  </footer>
</body>
</html>
