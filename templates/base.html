<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="https://use.typekit.net/qdt5rud.css">
  <link rel="icon" href="{{ get_url(path="favicon.ico") }}">
  <link rel="stylesheet" href="{{ get_url(path="giallo-light.css") }}" media="(prefers-color-scheme: light)">
  <link rel="stylesheet" href="{{ get_url(path="giallo-dark.css") }}" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{{ get_url(path="style.css") }}">
  <link rel="alternate" type="application/atom+xml" title="{{ config.title }}" href="{{ get_url(path="atom.xml", trailing_slash=false) }}">
  <meta property="og:title" content="{% block og_title %}{{ config.title }}{% endblock %}">
  <meta property="og:type" content="{% block og_type %}website{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{{ current_url | default(value=config.base_url) }}{% endblock %}">
  <meta property="og:description" content="{% block og_description %}{{ config.description }}{% endblock %}">
  <link rel="canonical" href="{% block canonical %}{{ current_url | default(value=config.base_url) }}{% endblock %}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{% block twitter_title %}{{ config.title }}{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}{{ config.description }}{% endblock %}">
  <meta property="og:image" content="{% block og_image %}{{ get_url(path="favicon.ico") }}{% endblock %}">
  <meta property="og:site_name" content="{{ config.title }}">
  <meta name="author" content="{{ config.author }}">
  {% block article_meta %}{% endblock %}
</head>
<body>
  <header>
    <nav>
      <a href="{{ get_url(path="/") }}">Home</a>
      <a href="{{ get_url(path="/tags/") }}">Tags</a>
      <a href="{{ get_url(path="@/about/_index.md") }}">About</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p class="footer-links">
      <a href="https://github.com/Multipixelone">GitHub</a>
      <span class="sep">·</span>
      <a href="https://resume.finnrut.is/">Resume</a>
      <span class="sep">·</span>
      <a href="{{ get_url(path="atom.xml", trailing_slash=false) }}">Atom feed</a>
    </p>
    <p class="copyright">&copy; {{ now() | date(format="%Y") }} {{ config.author }}</p>
  </footer>

  <script>
  (function () {
    function initCodeBlocks() {
      document.querySelectorAll('pre.z-code').forEach(function (pre) {
        var code = pre.querySelector('code');
        if (!code) return;

        // Keyboard accessibility for horizontal scrolling.
        pre.tabIndex = 0;
        pre.setAttribute('role', 'region');

        // Caption for the header bar: filename beats language.
        var lang = code.dataset.lang || '';
        var name = code.dataset.name || '';
        var caption = name || lang || 'code';
        pre.dataset.caption = caption;

        var label = 'Code block' + (caption !== 'code' ? ': ' + caption : '');
        pre.setAttribute('aria-label', label);

        // Real header element (replaces the ::before pseudo-element).
        var header = document.createElement('div');
        header.className = 'z-code-header';
        header.textContent = caption;
        pre.insertBefore(header, code);

        // Copy button.
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'copy-btn';
        btn.setAttribute('aria-label', 'Copy code to clipboard');
        btn.textContent = 'Copy';

        btn.addEventListener('click', function () {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(code.textContent).then(function () {
              btn.textContent = 'Copied!';
              btn.classList.add('copied');
              btn.setAttribute('aria-label', 'Copied');
              setTimeout(function () {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
                btn.setAttribute('aria-label', 'Copy code to clipboard');
              }, 2000);
            }).catch(function () {
              btn.textContent = 'Error';
              setTimeout(function () {
                btn.textContent = 'Copy';
              }, 2000);
            });
          }
        });

        pre.appendChild(btn);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCodeBlocks);
    } else {
      initCodeBlocks();
    }
  })();
  </script>
</body>
</html>
