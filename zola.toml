# Zola configuration for Finn Rutis' technical blog
# Docs: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://blog.finnrut.is/"
title = "Finn Rutis"
description = "Technical writings by Finn Rutis"
author = "Finn Rutis"
default_language = "en"

# Atom feed — generated by the homepage section; see content/_index.md
generate_feeds = false
feed_filenames = ["atom.xml"]

# Tags taxonomy — front-matter `tags:` lists become clickable cross-links.
# See templates/tags/{list,single}.html. Per-tag Atom feeds are generated at
# /tags/<slug>/atom.xml (linked from the tag listing pages).
taxonomies = [
    {name = "tags", feed = true}
]

# Syntax highlighting (Zola 0.22+ uses [markdown.highlighting])
[markdown]
github_alerts = true

# style = "class" emits z-* token classes; colors come entirely from
# static/giallo-{light,dark}.css (Gruvbox). The theme names below are only a
# fallback if style is switched to inline/enriched — Zola 0.22 ships no
# "gruvbox" theme, so keep the bundled github pair to stay build-green.
[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
# Site-wide extra data accessible in templates via config.extra
