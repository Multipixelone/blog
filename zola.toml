# Zola configuration for Finn Rutis' technical blog
# Docs: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://blog.finnrut.is/"
title = "Finn Rutis"
description = "Technical writings by Finn Rutis"
author = "Finn Rutis"
default_language = "en"

# Atom feed — generated by the homepage section; see content/_index.md
generate_feeds = false
feed_filenames = ["atom.xml"]

# Syntax highlighting (Zola 0.22+ uses [markdown.highlighting])
[markdown]
github_alerts = true

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"

[extra]
# Site-wide extra data accessible in templates via config.extra
